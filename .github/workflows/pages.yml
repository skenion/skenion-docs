name: GitHub Pages

on:
  workflow_dispatch:
    inputs:
      train-version:
        description: Compatibility line version to promote, for example 0.45.0.
        required: true
        type: string
      manifest:
        description: Inline compatibility matrix JSON, or path in manifest-repository.
        required: true
        type: string
      manifest-ref:
        description: Immutable compatibility matrix commit SHA.
        required: true
        type: string
      manifest-repository:
        description: Repository owning a manifest path, for example skenion/skenion.
        required: false
        default: skenion/skenion
        type: string
  repository_dispatch:
    types:
      - skenion-compatibility-matrix-manual-promote
      - skenion-train-manual-promote

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  resolve-promotion:
    name: Resolve promotion inputs
    runs-on: ubuntu-latest
    outputs:
      train-version: ${{ steps.resolve.outputs['train-version'] }}
      train-id: ${{ steps.resolve.outputs['train-id'] }}
      compatibility-version: ${{ steps.resolve.outputs['compatibility-version'] }}
      compatibility-line: ${{ steps.resolve.outputs['compatibility-line'] }}
      manifest: ${{ steps.materialize.outputs.manifest }}
      manifest-ref: ${{ steps.resolve.outputs['manifest-ref'] }}
      manifest-repository: ${{ steps.resolve.outputs['manifest-repository'] }}
    steps:
      - uses: actions/checkout@v6
      - id: resolve
        run: node scripts/resolve-manual-promotion-inputs.mjs
      - name: Checkout manifest source
        if: ${{ steps.resolve.outputs['manifest-is-inline'] != 'true' }}
        uses: actions/checkout@v6
        with:
          repository: ${{ steps.resolve.outputs['manifest-repository'] }}
          ref: ${{ steps.resolve.outputs['manifest-ref'] }}
          path: .skenion-manifest-source
          persist-credentials: false
          token: ${{ secrets.GH_TOKEN }}
      - id: materialize
        env:
          SKENION_MANUAL_MANIFEST: ${{ steps.resolve.outputs.manifest }}
          SKENION_MANUAL_MANIFEST_ROOT: .skenion-manifest-source
        run: node scripts/materialize-manual-promotion-manifest.mjs

  validate-matrix:
    name: Verify compatibility matrix
    needs: resolve-promotion
    uses: skenion/skenion-ci/.github/workflows/verify-compatibility-matrix.yml@v2
    with:
      matrix: ${{ needs.resolve-promotion.outputs.manifest }}
      manifest-ref: ${{ needs.resolve-promotion.outputs['manifest-ref'] }}
    secrets:
      GH_TOKEN: ${{ secrets.GH_TOKEN }}

  build:
    name: Build Manual artifact
    runs-on: ubuntu-latest
    needs:
      - resolve-promotion
      - validate-matrix
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
      SKENION_MANUAL_TRAIN_VERSION: ${{ needs.resolve-promotion.outputs['train-version'] }}
      SKENION_MANUAL_TRAIN_ID: ${{ needs.resolve-promotion.outputs['train-id'] }}
      SKENION_MANUAL_TRAIN_MANIFEST: ${{ needs.resolve-promotion.outputs.manifest }}
      SKENION_MANUAL_COMPATIBILITY_VERSION: ${{ needs.resolve-promotion.outputs['compatibility-version'] }}
      SKENION_MANUAL_COMPATIBILITY_MATRIX: ${{ needs.resolve-promotion.outputs.manifest }}
      SKENION_MANUAL_MANIFEST_REF: ${{ needs.resolve-promotion.outputs['manifest-ref'] }}
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          version: 10.12.4
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - uses: actions/configure-pages@v6
      - run: pnpm install --frozen-lockfile
      - run: pnpm run docs:check
      - id: promotion
        run: >-
          node scripts/verify-manual-promotion.mjs
          --out .skenion-manual-promotion/manual-promotion.json
      - run: pnpm run build
      - run: |
          mkdir -p build/release
          cp .skenion-manual-promotion/manual-promotion.json build/release/manual-promotion.json
      - uses: actions/upload-pages-artifact@v5
        with:
          path: build

  deploy:
    name: Deploy Pages
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
